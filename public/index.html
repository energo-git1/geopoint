function getMonday(d){var dt=new Date(d);var day=dt.getDay();var diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);return dt}
function fmtDate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r}

// Lithuanian public holidays (fixed dates + Easter-based)
function getLTHolidays(year){
  var fixed=[year+"-01-01",year+"-02-16",year+"-03-11",year+"-05-01",year+"-06-24",year+"-07-06",year+"-08-15",year+"-11-01",year+"-11-02",year+"-12-24",year+"-12-25",year+"-12-26"];

  var easter=new Date(year,eM-1,eD);
  var easterStr=fmtDate(easter);
  var easterMon=fmtDate(addDays(easter,1));
  fixed.push(easterStr);fixed.push(easterMon);
  return fixed;
}

      if(up.status==="Priskirtas"&&up.assignedTo){addN(up.assignedTo,"📋 Nauja užduotis: "+(TL[up.type]||"")+" — "+up.address+" ("+up.dueDate+")",up.id);addN(up.createdBy,"Užsakymas priskirtas geodezininkui: "+up.address,up.id)}
      if(up.status==="LaukiaPatvirtinimo")users.filter(function(u){return u.role==="admin"}).forEach(function(a){addN(a.id,"⏳ Laukia patvirtinimo: "+up.address,up.id)});
      if(up.status==="Ivykdytas"){addN(up.createdBy,"✅ Užsakymas įvykdytas: "+up.address+". Pranešimas išsiųstas el. paštu: "+up.email,up.id);if(up.assignedTo)addN(up.assignedTo,"✅ Administratorius patvirtino įvykdymą: "+up.address,up.id);users.filter(function(u){return u.role==="admin"}).forEach(function(a){addN(a.id,"✅ Patvirtintas kaip įvykdytas: "+up.address,up.id)})}
      if(up.status==="Atmestas")addN(up.createdBy,"❌ Atmestas: "+up.address,up.id);
      if(["Pamatuota","Braizoma","Derinama","Priimtas"].indexOf(up.status)!==-1)addN(up.createdBy,"ℹ️ Būsena: "+(SL[up.status]||up.status)+" — "+up.address,up.id)}}
  function deleteOrder(id){sOrders(function(p){return p.filter(function(o){return o.id!==id})})}
  function resetPw(uid2,pw){sUsers(function(p){return p.map(function(u){return u.id===uid2?Object.assign({},u,{password:pw,mustChangePassword:true}):u})})}
  function addUser(nu){sUsers(function(p){return p.concat([nu])})}
  function deleteUser(id){sUsers(function(p){return p.filter(function(u){return u.id!==id})})}

  // Navigate to order from notification
  function goToOrder(orderId){if(!orderId)return;var o=orders.find(function(x){return x.id===orderId});if(o){sSel(o);sSN(false)}}

  var surveyors=users.filter(function(u){return u.role==="surveyor"});
  var newC=orders.filter(function(o){return o.status==="Naujas"||o.status==="LaukiaPatvirtinimo"}).length;
  var unread=user?notifs.filter(function(n){return n.to===user.id&&!n.read}).length:0;

  if(!loaded)return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,color:C.t2}}>Kraunama...</div>;
  if(!user)return <AuthScreen onAuth={doAuth} users={users}/>;
  if(user.mustChangePassword)return <PasswordChange onChangePassword={changePassword}/>;

  var vo=orders;var title="";var desc="";var voUnfiltered=orders;
  if(user.role==="orderer"){voUnfiltered=orders.filter(function(o){return o.createdBy===user.id});vo=voUnfiltered;title="Mano užsakymai";desc=voUnfiltered.length+" pateikti";
    if(stFilt!=="all")vo=vo.filter(function(o){return o.status===stFilt})}
  else if(user.role==="admin"){
    if(view==="inbox"){vo=orders.filter(function(o){return o.status==="Naujas"||o.status==="LaukiaPatvirtinimo"});title="📥 Gauti užsakymai";desc=vo.length+" laukia tvirtinimo"}
    else if(view==="all"){title="📦 Visi užsakymai";desc=orders.length+" sistemoje";vo=orders;
      if(stFilt!=="all")vo=vo.filter(function(o){return o.status===stFilt});
      if(ordFilt!=="all")vo=vo.filter(function(o){return o.createdBy===ordFilt});
      if(geoFilt!=="all")vo=vo.filter(function(o){return o.assignedTo===geoFilt})}}
  else if(user.role==="surveyor"){var myAll=orders.filter(function(o){return o.assignedTo===user.id});voUnfiltered=myAll;
    if(sTab==="active")vo=myAll.filter(function(o){return["Priskirtas","Priimtas","Pamatuota","Braizoma","Derinama","LaukiaPatvirtinimo"].indexOf(o.status)!==-1});
    else vo=myAll.filter(function(o){return o.status==="Ivykdytas"});voUnfiltered=vo;
    if(stFilt!=="all")vo=vo.filter(function(o){return o.status===stFilt});
    title="📋 Mano užduotys";desc=voUnfiltered.length+" užduotys"}

  var orderers=users.filter(function(u){return u.role==="orderer"});

  return <div style={{display:"flex",height:"100vh",fontFamily:F,background:C.bg,color:C.tx}}>
    <style dangerouslySetInnerHTML={{__html:"@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:"+C.b1+";border-radius:3px}select option{background:"+C.s1+";color:"+C.tx+"}input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7)}"}}/>
    <Sidebar user={user} view={view} setView={sView} onLogout={logout} badge={user.role==="admin"?newC:0} isDark={isDark} onToggleTheme={toggleTheme}/>
    <div style={{flex:1,overflow:"auto",padding:"18px 24px"}}>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
        <button onClick={function(){sSN(true)}} style={{position:"relative",background:"none",border:"none",color:C.t2,fontSize:16,cursor:"pointer",padding:3}}>🔔{unread>0&&<span style={{position:"absolute",top:0,right:0,width:13,height:13,borderRadius:"50%",background:C.rd,color:"#fff",fontSize:7,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread>9?"9+":unread}</span>}</button></div>

      {view==="new"&&user.role==="orderer"?<OrderForm user={user} orders={orders} onSubmit={addOrder} onCancel={function(){sView("my")}}/>
        :view==="schedule"?<div><h2 style={{fontSize:16,fontWeight:800,color:C.tx,fontFamily:F,marginBottom:12}}>📅 Darbų grafikas</h2>
          <WeekSchedule orders={orders} schedule={sched} surveyors={surveyors} users={users} isAdmin={user.role==="admin"} weekStart={ws}
            onPrev={function(){sWS(function(w){return addDays(w,-7)})}} onNext={function(){sWS(function(w){return addDays(w,7)})}}
            onAddEntry={function(e){sSched(function(p){return p.concat([e])})}} onRemoveEntry={function(id){sSched(function(p){return p.filter(function(e){return e.id!==id})})}}
            onClickOrder={function(o){sSel(o)}}/></div>
        :view==="analytics"&&user.role==="admin"?<Analytics orders={orders} users={users} surveyors={surveyors}/>
        :view==="users"&&user.role==="admin"?<UserMgmt users={users} onResetPw={resetPw} onAddUser={addUser} onDeleteUser={deleteUser}/>
        :view==="pw"?<PasswordChangePage user={user} onChangePassword={changePassword}/>
        :<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:6}}>
            <div><h1 style={{fontSize:18,fontWeight:800,marginBottom:1}}>{title}</h1><p style={{fontSize:10,color:C.t2}}>{desc}</p></div>
            {user.role==="orderer"&&view==="my"&&<Btn onClick={function(){sView("new")}}>➕ Naujas užsakymas</Btn>}</div>

          {user.role==="surveyor"&&view==="assigned"&&<div style={{display:"flex",gap:2,background:C.s2,borderRadius:8,padding:2,marginBottom:12}}>
            {[{id:"active",l:"Aktyvios užduotys"},{id:"done",l:"Atliktos"}].map(function(t){return <button key={t.id} onClick={function(){sSTab(t.id)}} style={{flex:1,padding:"7px 12px",borderRadius:7,border:"none",background:sTab===t.id?C.s3:"transparent",color:sTab===t.id?C.tx:C.t3,fontFamily:F,fontSize:11,fontWeight:600,cursor:"pointer"}}>{t.l}</button>})}</div>}

          {/* Filters for "all orders" */}
          {user.role==="admin"&&view==="all"&&<div style={{marginBottom:12}}>
            {/* Status filter */}
            <div style={{display:"flex",gap:3,marginBottom:6,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:C.t3,fontFamily:F,padding:"4px 6px"}}>Būsena:</span>
              <button onClick={function(){sSF("all")}} style={{padding:"4px 10px",borderRadius:6,border:"none",fontSize:10,fontWeight:600,fontFamily:F,background:stFilt==="all"?C.acD:"transparent",color:stFilt==="all"?C.ac:C.t3,cursor:"pointer"}}>Visi</button>
              {Object.keys(STATUS_MAP).map(function(s){var cnt=orders.filter(function(o){return o.status===s}).length;if(cnt===0)return null;return <button key={s} onClick={function(){sSF(s)}} style={{padding:"4px 10px",borderRadius:6,border:"none",fontSize:10,fontWeight:600,fontFamily:F,background:stFilt===s?STATUS_MAP[s].bg:"transparent",color:stFilt===s?STATUS_MAP[s].c:C.t3,cursor:"pointer"}}>{SL[s]} ({cnt})</button>})}</div>
            {/* Orderer filter */}
            <div style={{display:"flex",gap:3,marginBottom:6,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:C.t3,fontFamily:F,padding:"4px 6px"}}>Užsakovas:</span>
              <button onClick={function(){sOF("all")}} style={{padding:"4px 10px",borderRadius:6,border:"none",fontSize:10,fontWeight:600,fontFamily:F,background:ordFilt==="all"?C.acD:"transparent",color:ordFilt==="all"?C.ac:C.t3,cursor:"pointer"}}>Visi</button>
              {orderers.map(function(u){return <button key={u.id} onClick={function(){sOF(u.id)}} style={{padding:"4px 10px",borderRadius:6,border:"none",fontSize:10,fontWeight:600,fontFamily:F,background:ordFilt===u.id?C.acD:"transparent",color:ordFilt===u.id?C.ac:C.t3,cursor:"pointer"}}>{u.name}</button>})}</div>
            {/* Surveyor filter */}
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:C.t3,fontFamily:F,padding:"4px 6px"}}>Geodezininkas:</span>
              <button onClick={function(){sGF("all")}} style={{padding:"4px 10px",borderRadius:6,border:"none",fontSize:10,fontWeight:600,fontFamily:F,background:geoFilt==="all"?C.acD:"transparent",color:geoFilt==="all"?C.ac:C.t3,cursor:"pointer"}}>Visi</button>
              {surveyors.map(function(s){return <button key={s.id} onClick={function(){sGF(s.id)}} style={{padding:"4px 10px",borderRadius:6,border:"none",fontSize:10,fontWeight:600,fontFamily:F,background:geoFilt===s.id?C.acD:"transparent",color:geoFilt===s.id?C.ac:C.t3,cursor:"pointer"}}>{s.name.split(" ")[0]}</button>})}</div>
          </div>}

          {/* Status filter — all roles */}
          {((user.role==="orderer"&&view==="my")||(user.role==="surveyor"&&view==="assigned"))&&<div style={{display:"flex",gap:3,marginBottom:10,flexWrap:"wrap"}}>
            <span style={{fontSize:10,color:C.t3,fontFamily:F,padding:"4px 6px"}}>Filtras:</span>
            <button onClick={function(){sSF("all")}} style={{padding:"4px 10px",borderRadius:6,border:"none",fontSize:10,fontWeight:600,fontFamily:F,background:stFilt==="all"?C.acD:"transparent",color:stFilt==="all"?C.ac:C.t3,cursor:"pointer"}}>Visi ({voUnfiltered.length})</button>
            {Object.keys(STATUS_MAP).map(function(s){var cnt=voUnfiltered.filter(function(o){return o.status===s}).length;if(cnt===0)return null;return <button key={s} onClick={function(){sSF(s)}} style={{padding:"4px 10px",borderRadius:6,border:"none",fontSize:10,fontWeight:600,fontFamily:F,background:stFilt===s?STATUS_MAP[s].bg:"transparent",color:stFilt===s?STATUS_MAP[s].c:C.t3,cursor:"pointer"}}>{SL[s]} ({cnt})</button>})}
          </div>}

          <StatsRow orders={vo}/>
          {vo.length===0?<Empty icon="📭" title="Nėra užsakymų"/>:vo.map(function(o){return <OrderRow key={o.id} order={o} onClick={function(){sSel(o)}} users={users} surveyors={surveyors}/>})}
        </div>}
    </div>

    {selO&&<OrderDetail order={selO} onClose={function(){sSel(null)}} user={user} users={users} surveyors={surveyors} onUpdate={function(u){updateOrder(u);sSel(null)}} onDelete={function(id){deleteOrder(id);sSel(null)}}/>}

    {/* Notifications with double-click to navigate */}
    {showN&&<Modal open={true} onClose={function(){sSN(false)}} title="Pranešimai" w={460}>
      {notifs.filter(function(n){return n.to===user.id}).length===0?<Empty icon="🔕" title="Nėra pranešimų"/>
        :<div><div style={{fontSize:10,color:C.t3,fontFamily:F,marginBottom:8}}>💡 Paspauskite du kartus ant pranešimo, kad atsidarytų užsakymas.</div>
          <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:380,overflow:"auto"}}>
          {notifs.filter(function(n){return n.to===user.id}).sort(function(a,b){return b.time.localeCompare(a.time)}).map(function(n){
            return <div key={n.id}
              onClick={function(){sNotifs(function(p){return p.map(function(x){return x.id===n.id?Object.assign({},x,{read:true}):x})})}}
              onDoubleClick={function(){goToOrder(n.orderId)}}
              style={{padding:"8px 12px",borderRadius:8,background:n.read?C.bg:C.acD,border:"1px solid "+(n.read?C.b1:C.ac+"33"),cursor:"pointer",transition:"all .15s"}}>
              <div style={{fontSize:11,color:C.tx,fontFamily:F}}>{n.message}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:3}}>
                <div style={{fontSize:8,color:C.t3,fontFamily:FM}}>{n.time}</div>
                {n.orderId&&<div style={{fontSize:8,color:C.ac,fontFamily:F}}>↗ du kartai = atidaryti</div>}
              </div></div>})}</div></div>}</Modal>}
  </div>}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
